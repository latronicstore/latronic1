<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LaTRONIC Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: 'Oswald', sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #0a0a0a 60%, #000);
  color:white;

  /* FULL SCREEN */
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
header{
  padding:10px 20px;
  text-align:center;
  font-size:14px;
  color:#ff8c00;
  border-bottom:1px solid rgba(255,140,0,0.2);
  position:relative;
  z-index:5;
}

/* ===== HERO ===== */
.hero{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* 🔥 GLOW BACKGROUND (NO BLOCK CLICK) */
.hero::before,
.hero::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  filter: blur(40px);
  opacity:0.6;
  pointer-events:none; /* 🔥 FIX CLICK ISSUE */
  z-index:0;
}

.hero::before{
  background: radial-gradient(circle, rgba(255,140,0,0.25), transparent 60%);
  top:-120px;
  left:-120px;
}

.hero::after{
  background: radial-gradient(circle, rgba(0,140,255,0.2), transparent 60%);
  bottom:-120px;
  right:-120px;
}

/* ===== FLOATING CARDS BACKGROUND ===== */
.card-bg{
  position:absolute;
  inset:0;
  opacity:0.25;
  z-index:0;
  pointer-events:none; /* 🔥 FIX CLICK ISSUE */
}

/* cards */
.card{
  position:absolute;
  width:100px;
  height:140px;
  border-radius:10px;
  background-size:cover;
  background-position:center;
  animation: float 12s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-30px)}
  100%{transform:translateY(0)}
}

/* ===== TITLE ===== */
.hero h1{
  font-family:"Bebas Neue", sans-serif;
  font-size: clamp(40px, 7vw, 90px);
  letter-spacing:2px;
  background: linear-gradient(90deg, #ffcc00, #ff3300, #00ccff);
  -webkit-background-clip:text;
  color:transparent;
  position:relative;
  z-index:2;
}

.hero p{
  margin-top:10px;
  color:#bbb;
  max-width:600px;
  font-size:16px;
  position:relative;
  z-index:2;
}

/* ===== BUTTON (SHOP NOW FIXED) ===== */
.btn{
  margin-top:20px;
  padding:14px 34px;
  border-radius:999px;
  background:linear-gradient(135deg,#ffcc00,#ff3300);
  color:black;
  font-weight:700;
  text-decoration:none;
  position:relative;
  z-index:5; /* 🔥 IMPORTANT: CLICK ALWAYS WORKS */
  box-shadow: 0 10px 30px rgba(255,100,0,0.25);
  transition: all 0.25s ease;
  display:inline-block;
}

.btn:hover{
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 15px 40px rgba(255,100,0,0.35);
}

/* ===== FOOTER ===== */
footer{
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:10px 15px;
  border-top:1px solid rgba(255,140,0,0.2);
  background:#0b0b0b;
  color:#ff8c00;
  font-size:12px;
  position:relative;
  z-index:5;
}

footer a{
  color:#ff8c00;
  text-decoration:none;
  margin:0 5px;
}

footer a:hover{
  color:#ff4d00;
}

.icon{
  margin-right:5px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  footer{
    flex-direction:column;
    gap:5px;
    text-align:center;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  🚀 Free Shipping USA • 📦 Collectibles • 🔥 LaTRONIC Store
</header>

<!-- HERO -->
<div class="hero">

  <div class="card-bg">

    <div class="card" style="top:10%; left:10%; background-image:url('https://images.pokemontcg.io/base1/4.png');"></div>
    <div class="card" style="top:30%; left:50%; background-image:url('https://images.pokemontcg.io/base1/2.png');"></div>
     <div class="card" style="bottom:15%; left:70%; background-image:url('https://images.pokemontcg.io/base1/1.png'); animation-delay:2s;"></div>
     <div class="card" style="bottom:5%; left:25%; background-image:url('https://images.pokemontcg.io/base1/6.png'); animation-delay:2s;"></div>
     <div class="card" style="bottom:75%; left:70%; background-image:url('https://images.pokemontcg.io/base1/10.png'); animation-delay:2s;"></div>
     <div class="card" style="bottom:35%; left:20%; background-image:url('https://images.pokemontcg.io/base1/15.png'); animation-delay:2s;"></div>
  </div>

  <h1>LaTRONIC STORE</h1>
  <p>Pokémon • Panini Sports Cards • Topps • Disney Collectibles</p>
  <a href="shop.html" class="btn">SHOP NOW</a>
</div>

<!-- FOOTER -->
<footer>

  <div>
    <i class="bi bi-envelope icon"></i>
    <a href="mailto:latronicstore@gmail.com">latronicstore@gmail.com</a>
  </div>

  <div>
    <i class="bi bi-instagram icon"></i>
    <a href="https://instagram.com/latronicstore" target="_blank" rel="noopener">@latronicstore</a>
  </div>

  <div>
    📍 Connecticut, United States
  </div>

  <div>
    © 2026 LaTRONIC LLC
  </div>

</footer>

</body>
</html>
